backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

publish_mode: editorial_workflow

i18n:
  structure: "multiple_file"
  locales: ["ja", "en"]
  default_locale: "ja"

collections:
  - name: "buildings"
    label: "建築作品"
    folder: "content/buildings"
    create: true
    slug: "{{slug}}"
    i18n: true
    fields:
      - { label: "Locale", name: "locale", widget: "select", options: [{ label: "日本語", value: "ja" }, { label: "English", value: "en" }], default: "ja" }
      - { label: "タイトル", name: "title", widget: "string", required: true }
      - { label: "説明", name: "description", widget: "text", required: true, rows: 3 }
      - { label: "建造年", name: "year", widget: "number", required: true }
      - { label: "所在地", name: "location", widget: "string", required: true }
      - { label: "画像", name: "image", widget: "image", required: false }
      - { label: "本文", name: "content", widget: "markdown", required: true }
      - { label: "日付", name: "date", widget: "datetime", required: true }

  - name: "research-logs"
    label: "活動記録"
    folder: "content/research-logs"
    create: true
    slug: "{{slug}}"
    i18n: true
    fields:
      - { label: "Locale", name: "locale", widget: "select", options: [{ label: "日本語", value: "ja" }, { label: "English", value: "en" }], default: "ja" }
      - { label: "タイトル", name: "title", widget: "string", required: true }
      - { label: "カテゴリ", name: "category", widget: "string", required: true }
      - { label: "内容", name: "excerpt", widget: "text", required: true, rows: 2 }
      - { label: "本文", name: "content", widget: "markdown", required: true }
      - { label: "日付", name: "date", widget: "datetime", required: true }
