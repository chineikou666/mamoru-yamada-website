backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: "Create {{collection}} '{{slug}}'"
    update: "Update {{collection}} '{{slug}}'"
    delete: "Delete {{collection}} '{{slug}}'"
    uploadMedia: "[skip ci] Upload '{{path}}'"
    deleteMedia: "[skip ci] Delete '{{path}}'"

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

# Publishing workflow
publish_mode: editorial_workflow

# Collections configuration
collections:
  # ============================================
  # Buildings Collection (建築)
  # ============================================
  - name: "buildings"
    label: "建築作品 (Buildings)"
    folder: "content/buildings"
    create: true
    slug: "{{slug}}"
    preview_path: "{{locale}}/buildings/{{slug}}"
    
    # I18n support
    i18n:
      structure: "multiple_file"
      locales: ["ja", "en"]
      default_locale: "ja"
    
    fields:
      - label: "Locale"
        name: "locale"
        widget: "select"
        options:
          - { label: "日本語", value: "ja" }
          - { label: "English", value: "en" }
        default: "ja"
      
      - label: "Slug"
        name: "slug"
        widget: "string"
        pattern: ["^[a-z0-9]+(?:-[a-z0-9]+)*$", "A slug must consist of lowercase alphanumeric characters and hyphens"]
      
      - label: "タイトル (Title)"
        name: "title"
        widget: "string"
        required: true
      
      - label: "説明 (Description)"
        name: "description"
        widget: "text"
        required: true
        rows: 3
      
      - label: "建造年 (Year)"
        name: "year"
        widget: "number"
        required: true
        min: 1900
        max: 2100
        step: 1
      
      - label: "所在地 (Location)"
        name: "location"
        widget: "string"
        required: true
      
      - label: "地域 (Region)"
        name: "region"
        widget: "select"
        options:
          - { label: "北海道 (Hokkaido)", value: "hokkaido" }
          - { label: "関東 (Kanto)", value: "kanto" }
          - { label: "中部 (Chubu)", value: "chubu" }
          - { label: "関西 (Kansai)", value: "kansai" }
        required: true
      
      - label: "緯度 (Latitude)"
        name: "lat"
        widget: "number"
        required: true
        min: -90
        max: 90
        step: 0.0001
        value_type: "float"
      
      - label: "経度 (Longitude)"
        name: "lng"
        widget: "number"
        required: true
        min: -180
        max: 180
        step: 0.0001
        value_type: "float"
      
      - label: "画像 (Images)"
        name: "images"
        widget: "list"
        required: false
        max: 20
        field:
          - label: "画像ファイル (Image File)"
            name: "image"
            widget: "image"
            required: true
          - label: "キャプション (Caption)"
            name: "caption"
            widget: "string"
            required: false
          - label: "alt テキスト (Alt Text)"
            name: "alt"
            widget: "string"
            required: false
      
      - label: "本文 (Content)"
        name: "content"
        widget: "markdown"
        required: true
        minimal: false
      
      - label: "メタデータ (Metadata)"
        name: "metadata"
        widget: "object"
        collapsed: true
        fields:
          - label: "og:image"
            name: "ogImage"
            widget: "image"
            required: false
          - label: "og:description"
            name: "ogDescription"
            widget: "text"
            required: false
      
      - label: "公開日時 (Publication Date)"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD HH:mm:ss"
        required: true

  # ============================================
  # Research Logs Collection (研究日誌)
  # ============================================
  - name: "research-logs"
    label: "研究日誌 (Research Logs)"
    folder: "content/research-logs"
    create: true
    slug: "{{slug}}"
    preview_path: "{{locale}}/research/{{slug}}"
    
    # I18n support
    i18n:
      structure: "multiple_file"
      locales: ["ja", "en"]
      default_locale: "ja"
    
    fields:
      - label: "Locale"
        name: "locale"
        widget: "select"
        options:
          - { label: "日本語", value: "ja" }
          - { label: "English", value: "en" }
        default: "ja"
      
      - label: "Slug"
        name: "slug"
        widget: "string"
        pattern: ["^[a-z0-9]+(?:-[a-z0-9]+)*$", "A slug must consist of lowercase alphanumeric characters and hyphens"]
      
      - label: "タイトル (Title)"
        name: "title"
        widget: "string"
        required: true
      
      - label: "カテゴリ (Category)"
        name: "category"
        widget: "string"
        required: true
        options:
          - { label: "建築理論 (Architecture Theory)", value: "architecture-theory" }
          - { label: "環境設計 (Environmental Design)", value: "environmental-design" }
          - { label: "建築史 (Architecture History)", value: "architecture-history" }
          - { label: "都市計画 (Urban Planning)", value: "urban-planning" }
          - { label: "材料研究 (Material Research)", value: "material-research" }
          - { label: "その他 (Other)", value: "other" }
      
      - label: "抜粋 (Excerpt)"
        name: "excerpt"
        widget: "text"
        required: true
        rows: 2
        pattern: [".{20,}", "Excerpt must be at least 20 characters"]
      
      - label: "本文 (Content)"
        name: "content"
        widget: "markdown"
        required: true
        minimal: false
      
      - label: "関連建築 (Related Buildings)"
        name: "relatedBuildings"
        widget: "list"
        required: false
        max: 5
        field:
          - label: "建築ID (Building ID)"
            name: "buildingId"
            widget: "string"
            required: true
      
      - label: "画像 (Featured Image)"
        name: "featuredImage"
        widget: "image"
        required: false
        media_folder: "/public/images/uploads"
        public_folder: "/images/uploads"
      
      - label: "タグ (Tags)"
        name: "tags"
        widget: "list"
        required: false
        max: 10
        field:
          - label: "タグ (Tag)"
            name: "tag"
            widget: "string"
      
      - label: "メタデータ (Metadata)"
        name: "metadata"
        widget: "object"
        collapsed: true
        fields:
          - label: "og:image"
            name: "ogImage"
            widget: "image"
            required: false
          - label: "og:description"
            name: "ogDescription"
            widget: "text"
            required: false
      
      - label: "投稿日時 (Publication Date)"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD HH:mm:ss"
        required: true

  # ============================================
  # About/Project Introduction Collection
  # ============================================
  - name: "about"
    label: "概要 (About)"
    folder: "content/about"
    create: true
    slug: "{{slug}}"
    preview_path: "{{locale}}/about"
    
    # I18n support
    i18n:
      structure: "multiple_file"
      locales: ["ja", "en"]
      default_locale: "ja"
    
    fields:
      - label: "Locale"
        name: "locale"
        widget: "select"
        options:
          - { label: "日本語", value: "ja" }
          - { label: "English", value: "en" }
        default: "ja"
      
      - label: "ページタイトル (Page Title)"
        name: "title"
        widget: "string"
        required: true
      
      - label: "自己紹介 (Bio)"
        name: "bio"
        widget: "markdown"
        required: true
        minimal: false
      
      - label: "経歴 (Career)"
        name: "career"
        widget: "list"
        required: false
        max: 20
        fields:
          - label: "年 (Year)"
            name: "year"
            widget: "string"
            required: true
          - label: "内容 (Description)"
            name: "description"
            widget: "string"
            required: true
      
      - label: "受賞歴 (Awards)"
        name: "awards"
        widget: "list"
        required: false
        max: 20
        fields:
          - label: "年 (Year)"
            name: "year"
            widget: "string"
            required: true
          - label: "賞 (Award Name)"
            name: "name"
            widget: "string"
            required: true
          - label: "対象 (For)"
            name: "for"
            widget: "string"
            required: false
      
      - label: "プロフィール画像 (Profile Image)"
        name: "profileImage"
        widget: "image"
        required: false
        media_folder: "/public/images/uploads"
        public_folder: "/images/uploads"
      
      - label: "連絡先 (Contact)"
        name: "contact"
        widget: "object"
        required: false
        fields:
          - label: "メール (Email)"
            name: "email"
            widget: "string"
            required: false
          - label: "電話番号 (Phone)"
            name: "phone"
            widget: "string"
            required: false
          - label: "SNS リンク (Social Links)"
            name: "socialLinks"
            widget: "list"
            required: false
            fields:
              - label: "プラットフォーム (Platform)"
                name: "platform"
                widget: "select"
                options:
                  - { label: "Twitter/X", value: "twitter" }
                  - { label: "Instagram", value: "instagram" }
                  - { label: "LinkedIn", value: "linkedin" }
                  - { label: "Website", value: "website" }
              - label: "URL"
                name: "url"
                widget: "string"
                required: true
      
      - label: "メタデータ (Metadata)"
        name: "metadata"
        widget: "object"
        collapsed: true
        fields:
          - label: "og:image"
            name: "ogImage"
            widget: "image"
            required: false
          - label: "og:description"
            name: "ogDescription"
            widget: "text"
            required: false

  # ============================================
  # Team Members Collection
  # ============================================
  - name: "team"
    label: "チームメンバー (Team Members)"
    folder: "content/team"
    create: true
    slug: "{{slug}}"
    preview_path: "{{locale}}/team/{{slug}}"
    
    # I18n support
    i18n:
      structure: "multiple_file"
      locales: ["ja", "en"]
      default_locale: "ja"
    
    fields:
      - label: "Locale"
        name: "locale"
        widget: "select"
        options:
          - { label: "日本語", value: "ja" }
          - { label: "English", value: "en" }
        default: "ja"
      
      - label: "名前 (Name)"
        name: "name"
        widget: "string"
        required: true
      
      - label: "役職 (Position)"
        name: "position"
        widget: "string"
        required: true
      
      - label: "自己紹介 (Bio)"
        name: "bio"
        widget: "markdown"
        required: true
        minimal: false
        rows: 4
      
      - label: "プロフィール画像 (Profile Image)"
        name: "profileImage"
        widget: "image"
        required: false
        media_folder: "/public/images/uploads"
        public_folder: "/images/uploads"
      
      - label: "連絡先 (Contact)"
        name: "contact"
        widget: "object"
        required: false
        fields:
          - label: "メール (Email)"
            name: "email"
            widget: "string"
            required: false
          - label: "SNS リンク (Social Links)"
            name: "socialLinks"
            widget: "list"
            required: false
            fields:
              - label: "プラットフォーム (Platform)"
                name: "platform"
                widget: "select"
                options:
                  - { label: "Twitter/X", value: "twitter" }
                  - { label: "Instagram", value: "instagram" }
                  - { label: "LinkedIn", value: "linkedin" }
                  - { label: "Website", value: "website" }
              - label: "URL"
                name: "url"
                widget: "string"
                required: true
      
      - label: "表示順 (Display Order)"
        name: "order"
        widget: "number"
        required: false
        default: 0
      
      - label: "メタデータ (Metadata)"
        name: "metadata"
        widget: "object"
        collapsed: true
        fields:
          - label: "og:image"
            name: "ogImage"
            widget: "image"
            required: false
          - label: "og:description"
            name: "ogDescription"
            widget: "text"
            required: false

  # ============================================
  # Site Settings Collection
  # ============================================
  - name: "settings"
    label: "サイト設定 (Site Settings)"
    folder: "content/settings"
    create: true
    slug: "{{slug}}"
    preview_path: "/"
    
    # I18n support
    i18n:
      structure: "multiple_file"
      locales: ["ja", "en"]
      default_locale: "ja"
    
    files:
      - file: "content/settings/general.yml"
        label: "基本設定 (General Settings)"
        name: "general"
        fields:
          - label: "Locale"
            name: "locale"
            widget: "select"
            options:
              - { label: "日本語", value: "ja" }
              - { label: "English", value: "en" }
            default: "ja"
          
          - label: "サイトタイトル (Site Title)"
            name: "siteTitle"
            widget: "string"
            required: true
          
          - label: "サイト説明 (Site Description)"
            name: "siteDescription"
            widget: "text"
            required: true
            rows: 2
          
          - label: "OG画像 (Default OG Image)"
            name: "ogImage"
            widget: "image"
            required: false
            media_folder: "/public/images/uploads"
            public_folder: "/images/uploads"
          
          - label: "ナビゲーション (Navigation)"
            name: "navigation"
            widget: "list"
            required: false
            max: 10
            fields:
              - label: "ラベル (Label)"
                name: "label"
                widget: "string"
                required: true
              - label: "パス (Path)"
                name: "path"
                widget: "string"
                required: true
