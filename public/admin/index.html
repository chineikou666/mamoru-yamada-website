<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Content Manager</title>
</head>
<body>
  <!-- 加载 Netlify Identity Widget -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  
  <!-- 加载 Decap CMS -->
  <script src="https://unpkg.com/decap-cms@3.3.0/dist/decap-cms.js"></script>
  
  <script>
    // 初始化 Identity Widget 并处理 recovery token
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", (user) => {
        if (!user) {
          // 如果有 recovery_token，打开重置密码对话框
          if (window.location.hash && window.location.hash.includes("recovery_token")) {
            window.netlifyIdentity.open("recovery");
          } else {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        }
      });
    }
  </script>
</body>
</html>
