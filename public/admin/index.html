<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Content Manager</title>
</head>
<body>
  <script>
    // Handle Netlify Identity invite and password reset callbacks
    (function() {
      var hash = window.location.hash;
      if (hash && (hash.indexOf('invite') !== -1 || hash.indexOf('password_reset') !== -1 || hash.indexOf('confirmation') !== -1)) {
        window.location.href = '/admin/' + hash;
      }
    })();
  </script>
  <script src="/admin/decap-cms.js"></script>
</body>
</html>
