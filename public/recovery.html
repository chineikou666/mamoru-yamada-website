<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="refresh" content="0;url=/admin/">
  <title>Redirecting to Content Manager...</title>
</head>
<body>
  <p>Redirecting to Content Manager...</p>
  <script>
    // 如果URL中有recovery_token，重定向到admin页面
    var hash = window.location.hash;
    if (hash && hash.includes("recovery_token")) {
      window.location.href = "/admin/" + hash;
    } else {
      window.location.href = "/admin/";
    }
  </script>
</body>
</html>
