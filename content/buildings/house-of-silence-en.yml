content: |
  A residence that finds silence amid urban bustle. Designed to incorporate natural light, allowing inhabitants to feel the passage of time through changing shadows. Local timber was used, balancing regional identity with sustainability.

  ## Design Concept

  "Silence" here refers not to the absence of sound, but to the quality of space that brings peace of mind. Even amidst urban noise, we sought to secure a space for introspection.

  ## Technical Features

  - Energy efficiency improvement through natural light introduction
  - Carbon footprint reduction through use of local timber
  - High-insulation wall system
