content: |
  都市の喧騒の中で静寂を見つける住宅。自然光を導入し、影の変化を通じて時間の流れを感じることができる空間を設計した。材料は地元の木材を使用し、地域性と持続可能性を両立させた。

  ## 設計コンセプト

  「静寂」は、物理的な音のなさではなく、心が安らぐ空間の質感を指す。都市の噪音の中でも、内省の空間を確保する。

  ## 技術的特徴

  - 自然光の導入によるエネルギー効率の向上
  - 地域木材の使用によるカーボンフットプリントの削減
  - 断熱性能の高い壁体システム
