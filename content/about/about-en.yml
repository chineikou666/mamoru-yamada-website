locale: en
title: Mamoru Yamada - Architect & Researcher
bio: |
  Mamoru Yamada is an architect and researcher based in Tokyo. He explores the relationship between humans and space through architecture.

  ## Background

  After graduating from the University of Tokyo's Department of Architecture in 2005, he gained five years of experience at a major architectural firm before establishing his own practice in 2010. Since then, he has been involved in diverse projects including residential, public, and educational facilities.

  ## Research Themes

  - Relationship between natural light and architectural spaces
  - Sustainable architectural design
  - Integration of regional identity with architecture
  - Architectural design utilizing digital technology

  ## Philosophy

  Guided by the belief that "architecture should not merely be buildings, but spaces that enrich people's lives," he approaches each project with dedication and innovation.
