locale: ja
title: 山田 守 - 建築家・研究者
bio: |
  山田守は、東京を拠点に活動する建築家・研究者です。建築を通じて、人間と空間の関係を探求しています。

  ## 経歴

  2005年に東京大学工学部建築学科を卒業後、大手建築事務所で5年間の経験を積み、2010年に独立。以来、住宅、公共建築、教育施設など、多様なプロジェクトに携わっています。

  ## 研究テーマ

  - 自然光と建築空間の関係
  - 持続可能な建築設計
  - 地域性と建築の融合
  - デジタル技術を活用した建築デザイン

  ## 方針

  「建築は単なる建物ではなく、人々の生活を豊かにする空間であるべきだ」という信念のもと、各プロジェクトに取り組んでいます。
